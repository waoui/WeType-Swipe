name: Export v1.10.0 production source

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/finalize-v1.10.0.yml"
      - "tools/finalize_v110.py"
  workflow_dispatch:

concurrency:
  group: finalize-v1.10.0
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: trigger-v1.10.0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate clean production source
        run: python3 tools/finalize_v110.py

      - name: Restore signing certificate
        shell: bash
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          test -n "$SIGNING_KEY_BASE64"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > signing.jks

      - name: Verify and build clean signed APK
        shell: bash
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          test -z "$(find tools -maxdepth 1 -name 'patch_v110_test*.py' -print -quit)"
          test -z "$(find .github/workflows -maxdepth 1 -name 'test-v1.10.0*.yml' -print -quit)"
          grep -q 'versionName = "1.10.0"' app/build.gradle.kts
          ! grep -q 'test11' app/src/main/java/com/rww/wetypeswipe/MainHook.java
          gradle --no-daemon clean assembleRelease

      - name: Package verified production source
        shell: bash
        run: |
          mkdir -p production-source/app/src/main/java/com/rww/wetypeswipe
          cp app/build.gradle.kts production-source/app/build.gradle.kts
          cp app/src/main/java/com/rww/wetypeswipe/Config.java production-source/app/src/main/java/com/rww/wetypeswipe/Config.java
          cp app/src/main/java/com/rww/wetypeswipe/MainActivity.java production-source/app/src/main/java/com/rww/wetypeswipe/MainActivity.java
          cp app/src/main/java/com/rww/wetypeswipe/MainHook.java production-source/app/src/main/java/com/rww/wetypeswipe/MainHook.java
          cp README.md production-source/README.md
          cp RELEASE_NOTES_v1.10.0.md production-source/RELEASE_NOTES_v1.10.0.md

      - uses: actions/upload-artifact@v4
        with:
          name: WeType-Swipe-v1.10.0-production-source
          path: production-source
          retention-days: 7

      - if: always()
        run: rm -f signing.jks
