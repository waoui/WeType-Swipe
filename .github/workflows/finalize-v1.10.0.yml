# One-shot production finalizer; this file removes itself after a successful build.
name: Finalize v1.10.0 production source

on:
  push:
    branches: [trigger-v1.10.0]
    paths:
      - ".github/workflows/finalize-v1.10.0.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/finalize-v1.10.0.yml"
      - "tools/finalize_v110.py"
  workflow_dispatch:

concurrency:
  group: finalize-v1.10.0
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: trigger-v1.10.0
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate clean production source
        id: generate
        shell: bash
        run: |
          set +e
          python3 tools/finalize_v110.py > /tmp/finalize.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat /tmp/finalize.log
          exit 0

      - name: Verify and build clean signed APK
        id: build
        if: steps.generate.outputs.status == '0'
        shell: bash
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set +e
          {
            test ! -e tools/finalize_v110.py
            test -z "$(find tools -maxdepth 1 -name 'patch_v110_test*.py' -print -quit)"
            test -z "$(find .github/workflows -maxdepth 1 -name 'test-v1.10.0*.yml' -print -quit)"
            grep -q 'versionName = "1.10.0"' app/build.gradle.kts
            ! grep -q 'test11' app/src/main/java/com/rww/wetypeswipe/MainHook.java
            test -n "$SIGNING_KEY_BASE64"
            printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > signing.jks
            gradle --no-daemon clean assembleRelease
          } > /tmp/build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat /tmp/build.log
          exit 0

      - name: Commit production source or diagnostic log
        shell: bash
        run: |
          generate_status='${{ steps.generate.outputs.status }}'
          build_status='${{ steps.build.outputs.status }}'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$generate_status" = "0" ] && [ "$build_status" = "0" ]; then
            git add -A
            git commit -m "release: finalize v1.10.0 production source"
          else
            cp /tmp/finalize.log /tmp/finalize.saved 2>/dev/null || true
            cp /tmp/build.log /tmp/build.saved 2>/dev/null || true
            git reset --hard HEAD
            {
              echo "generate_status=$generate_status"
              echo "build_status=$build_status"
              echo
              echo "===== finalize.log ====="
              cat /tmp/finalize.saved 2>/dev/null || true
              echo
              echo "===== build.log ====="
              cat /tmp/build.saved 2>/dev/null || true
            } > .finalize-error.txt
            git add .finalize-error.txt
            git commit -m "chore: record v1.10.0 finalizer failure"
          fi
          git push origin HEAD:trigger-v1.10.0

      - if: always()
        run: rm -f signing.jks
