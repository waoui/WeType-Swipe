name: 构建 v1.10.0-test3 诊断包

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/test-v1.10.0-test3.yml"
      - "tools/patch_v110_test3.py"

permissions:
  contents: read

jobs:
  build-test-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: 临时写入 test3 诊断功能
        run: python3 tools/patch_v110_test3.py

      - name: 恢复正式签名证书
        shell: bash
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          test -n "$SIGNING_KEY_BASE64"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > signing.jks

      - name: 编译同签名测试包
        id: build
        continue-on-error: true
        shell: bash
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -o pipefail
          gradle --no-daemon clean assembleRelease 2>&1 | tee build-test3.log

      - name: 上传完整编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WeType-Swipe-v1.10.0-test3-build-log
          path: build-test3.log
          retention-days: 7

      - name: 整理测试 APK
        if: steps.build.outcome == 'success'
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release.apk output/WeType_Swipe_LSPosed_v1.10.0-test3.apk

      - name: 上传测试 APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: WeType-Swipe-v1.10.0-test3
          path: output/WeType_Swipe_LSPosed_v1.10.0-test3.apk
          retention-days: 7

      - name: 标记编译失败
        if: steps.build.outcome != 'success'
        run: exit 1

      - if: always()
        run: rm -f signing.jks
