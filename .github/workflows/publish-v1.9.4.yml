name: Publish v1.11.0

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-v1.9.4.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate formal v1.11.0 source
        run: python3 tools/prepare_v111_release.py

      - name: Restore release signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEY_BASE64"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > signing.jks

      - name: Build signed APK
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: gradle --no-daemon clean assembleRelease

      - name: Materialize source and clean test assets
        run: |
          set -euo pipefail
          python3 tools/cleanup_v111_release.py
          rm -f .github/workflows/publish-v1.9.4.yml signing.jks
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v1.11.0"
          git push origin HEAD:main

      - name: Package release files
        run: |
          set -euo pipefail
          mkdir -p release-out
          cp app/build/outputs/apk/release/app-release.apk release-out/WeType_Swipe_LSPosed_v1.11.0.apk
          git archive --format=zip --output release-out/WeType_Swipe_LSPosed_v1.11.0_source.zip HEAD
          cd release-out
          sha256sum WeType_Swipe_LSPosed_v1.11.0.apk WeType_Swipe_LSPosed_v1.11.0_source.zip > WeType_Swipe_v1.11.0_SHA256SUMS.txt
          sha256sum --check --strict WeType_Swipe_v1.11.0_SHA256SUMS.txt
          unzip -t WeType_Swipe_LSPosed_v1.11.0_source.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_commit="$(git rev-parse HEAD)"
          gh release create v1.11.0 \
            release-out/WeType_Swipe_LSPosed_v1.11.0.apk \
            release-out/WeType_Swipe_LSPosed_v1.11.0_source.zip \
            release-out/WeType_Swipe_v1.11.0_SHA256SUMS.txt \
            --target "$release_commit" \
            --title "微信输入法下滑快捷键 v1.11.0" \
            --notes-file RELEASE_NOTES_v1.11.0.md \
            --latest
