name: 准备 v1.10.0 原生面板功能

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/prepare-v1.10.0.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: 修改源码
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new, count=1):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f"{path}: expected {count} matches, found {actual}: {old[:80]!r}")
              p.write_text(text.replace(old, new, count), encoding="utf-8")

          config = "app/src/main/java/com/rww/wetypeswipe/Config.java"
          replace(config,
              '    static final String KEY_SELECT_TO_PARAGRAPH_END = "select_to_paragraph_end";\n    static final String KEY_DISABLED_KEYS = "disabled_keys";',
              '    static final String KEY_SELECT_TO_PARAGRAPH_END = "select_to_paragraph_end";\n    static final String KEY_OPEN_CLIPBOARD = "open_clipboard";\n    static final String KEY_OPEN_QUICK_PHRASE = "open_quick_phrase";\n    static final String KEY_DISABLED_KEYS = "disabled_keys";')
          replace(config,
              '    static final int ACTION_SELECT_TO_PARAGRAPH_END = 9;\n\n    static final String[] ACTION_MENU_LABELS = {\n            "未绑定", "全选", "剪切", "复制", "粘贴",\n            "段首", "段尾", "选至段首", "选至段尾", "禁用下滑"\n    };',
              '    static final int ACTION_SELECT_TO_PARAGRAPH_END = 9;\n    static final int ACTION_OPEN_CLIPBOARD = 10;\n    static final int ACTION_OPEN_QUICK_PHRASE = 11;\n\n    static final String[] ACTION_MENU_LABELS = {\n            "未绑定", "全选", "剪切", "复制", "粘贴",\n            "段首", "段尾", "选至段首", "选至段尾",\n            "剪贴板", "快捷发送", "禁用下滑"\n    };')
          replace(config,
              '            ACTION_SELECT_TO_PARAGRAPH_START,\n            ACTION_SELECT_TO_PARAGRAPH_END,\n            ACTION_DISABLE',
              '            ACTION_SELECT_TO_PARAGRAPH_START,\n            ACTION_SELECT_TO_PARAGRAPH_END,\n            ACTION_OPEN_CLIPBOARD,\n            ACTION_OPEN_QUICK_PHRASE,\n            ACTION_DISABLE')
          replace(config,
              '    String selectToParagraphEnd = "";\n    String disabledKeys = "";',
              '    String selectToParagraphEnd = "";\n    String openClipboard = "";\n    String openQuickPhrase = "";\n    String disabledKeys = "";')
          replace(config,
              '        bind(selectToParagraphStart, ACTION_SELECT_TO_PARAGRAPH_START);\n        bind(selectToParagraphEnd, ACTION_SELECT_TO_PARAGRAPH_END);\n        bindDisabled(disabledKeys);',
              '        bind(selectToParagraphStart, ACTION_SELECT_TO_PARAGRAPH_START);\n        bind(selectToParagraphEnd, ACTION_SELECT_TO_PARAGRAPH_END);\n        bind(openClipboard, ACTION_OPEN_CLIPBOARD);\n        bind(openQuickPhrase, ACTION_OPEN_QUICK_PHRASE);\n        bindDisabled(disabledKeys);')
          replace(config,
              '        return action >= ACTION_NONE && action <= ACTION_SELECT_TO_PARAGRAPH_END\n                ? action : ACTION_NONE;',
              '        return action >= ACTION_NONE && action <= ACTION_OPEN_QUICK_PHRASE\n                ? action : ACTION_NONE;')
          replace(config,
              '            case ACTION_SELECT_TO_PARAGRAPH_END: return "选至段尾";\n            default: return "未绑定";',
              '            case ACTION_SELECT_TO_PARAGRAPH_END: return "选至段尾";\n            case ACTION_OPEN_CLIPBOARD: return "剪贴板";\n            case ACTION_OPEN_QUICK_PHRASE: return "快捷发送";\n            default: return "未绑定";')

          activity = "app/src/main/java/com/rww/wetypeswipe/MainActivity.java"
          replace(activity,
              '            Config.ACTION_SELECT_TO_PARAGRAPH_START,\n            Config.ACTION_SELECT_TO_PARAGRAPH_END\n    };',
              '            Config.ACTION_SELECT_TO_PARAGRAPH_START,\n            Config.ACTION_SELECT_TO_PARAGRAPH_END,\n            Config.ACTION_OPEN_CLIPBOARD,\n            Config.ACTION_OPEN_QUICK_PHRASE\n    };')
          replace(activity,
              '            "段首", "段尾", "选至段首", "选至段尾"\n    };',
              '            "段首", "段尾", "选至段首", "选至段尾",\n            "剪贴板", "快捷发送"\n    };')
          replace(activity, 'TextView version = text("v1.9.4 · 点击键位设置下滑动作", 13, COLOR_SECONDARY);',
                            'TextView version = text("v1.10.0 · 新增原生剪贴板与快捷发送", 13, COLOR_SECONDARY);')
          replace(activity,
              '        qwertyKeys[7] = normalizedKey(prefs.getString(Config.KEY_SELECT_TO_PARAGRAPH_END, ""));\n        disabledKeys = normalizedKeys',
              '        qwertyKeys[7] = normalizedKey(prefs.getString(Config.KEY_SELECT_TO_PARAGRAPH_END, ""));\n        qwertyKeys[8] = normalizedKey(prefs.getString(Config.KEY_OPEN_CLIPBOARD, ""));\n        qwertyKeys[9] = normalizedKey(prefs.getString(Config.KEY_OPEN_QUICK_PHRASE, ""));\n        disabledKeys = normalizedKeys')
          replace(activity,
              '                .putString(Config.KEY_SELECT_TO_PARAGRAPH_END, qwertyKeys[7])\n                .putString(Config.KEY_DISABLED_KEYS, disabledKeys)',
              '                .putString(Config.KEY_SELECT_TO_PARAGRAPH_END, qwertyKeys[7])\n                .putString(Config.KEY_OPEN_CLIPBOARD, qwertyKeys[8])\n                .putString(Config.KEY_OPEN_QUICK_PHRASE, qwertyKeys[9])\n                .putString(Config.KEY_DISABLED_KEYS, disabledKeys)')
          replace(activity,
              '        changed.putExtra(Config.KEY_SELECT_TO_PARAGRAPH_END, qwertyKeys[7]);\n        changed.putExtra(Config.KEY_DISABLED_KEYS, disabledKeys);',
              '        changed.putExtra(Config.KEY_SELECT_TO_PARAGRAPH_END, qwertyKeys[7]);\n        changed.putExtra(Config.KEY_OPEN_CLIPBOARD, qwertyKeys[8]);\n        changed.putExtra(Config.KEY_OPEN_QUICK_PHRASE, qwertyKeys[9]);\n        changed.putExtra(Config.KEY_DISABLED_KEYS, disabledKeys);')
          replace(activity,
              '            case Config.ACTION_SELECT_TO_PARAGRAPH_END: return "选段尾";\n            default: return "—";',
              '            case Config.ACTION_SELECT_TO_PARAGRAPH_END: return "选段尾";\n            case Config.ACTION_OPEN_CLIPBOARD: return "剪贴板";\n            case Config.ACTION_OPEN_QUICK_PHRASE: return "快捷语";\n            default: return "—";')

          hook = "app/src/main/java/com/rww/wetypeswipe/MainHook.java"
          replace(hook, 'import android.view.View;\n', 'import android.view.View;\nimport android.view.ViewGroup;\n')
          replace(hook, 'import android.view.inputmethod.SurroundingText;\n', 'import android.view.inputmethod.SurroundingText;\nimport android.widget.TextView;\n')
          replace(hook, 'logInfo("v1.9.4 entered target package");', 'logInfo("v1.10.0 entered target package");')
          replace(hook,
              '            config.selectToParagraphEnd = intent.getStringExtra(Config.KEY_SELECT_TO_PARAGRAPH_END);\n            config.disabledKeys = intent.getStringExtra(Config.KEY_DISABLED_KEYS);',
              '            config.selectToParagraphEnd = intent.getStringExtra(Config.KEY_SELECT_TO_PARAGRAPH_END);\n            config.openClipboard = intent.getStringExtra(Config.KEY_OPEN_CLIPBOARD);\n            config.openQuickPhrase = intent.getStringExtra(Config.KEY_OPEN_QUICK_PHRASE);\n            config.disabledKeys = intent.getStringExtra(Config.KEY_DISABLED_KEYS);')
          replace(hook,
              '            if (config.selectToParagraphEnd == null) config.selectToParagraphEnd = "";\n            if (config.disabledKeys == null) config.disabledKeys = "";',
              '            if (config.selectToParagraphEnd == null) config.selectToParagraphEnd = "";\n            if (config.openClipboard == null) config.openClipboard = "";\n            if (config.openQuickPhrase == null) config.openQuickPhrase = "";\n            if (config.disabledKeys == null) config.disabledKeys = "";')
          replace(hook,
              '                    .putString(Config.KEY_SELECT_TO_PARAGRAPH_END, config.selectToParagraphEnd)\n                    .putString(Config.KEY_DISABLED_KEYS, config.disabledKeys)',
              '                    .putString(Config.KEY_SELECT_TO_PARAGRAPH_END, config.selectToParagraphEnd)\n                    .putString(Config.KEY_OPEN_CLIPBOARD, config.openClipboard)\n                    .putString(Config.KEY_OPEN_QUICK_PHRASE, config.openQuickPhrase)\n                    .putString(Config.KEY_DISABLED_KEYS, config.disabledKeys)')
          replace(hook,
              '            config.selectToParagraphEnd = prefs.getString(Config.KEY_SELECT_TO_PARAGRAPH_END, "");\n            config.disabledKeys = prefs.getString(Config.KEY_DISABLED_KEYS, "");',
              '            config.selectToParagraphEnd = prefs.getString(Config.KEY_SELECT_TO_PARAGRAPH_END, "");\n            config.openClipboard = prefs.getString(Config.KEY_OPEN_CLIPBOARD, "");\n            config.openQuickPhrase = prefs.getString(Config.KEY_OPEN_QUICK_PHRASE, "");\n            config.disabledKeys = prefs.getString(Config.KEY_DISABLED_KEYS, "");')

          old_perform = '''    private void performAction(Context context, int action, String key) {
              String actionName = Config.actionName(action);
              try {
                  InputMethodService ime = imeRef.get();
                  if (ime == null) ime = findIme(context);
                  if (ime == null) {
                      logError("action failed: no input method service", null);
                      return;
                  }
                  imeRef = new WeakReference<>(ime);

                  EditorInfo editorInfo = ime.getCurrentInputEditorInfo();
                  if (editorInfo != null && isPassword(editorInfo.inputType)) return;

                  InputConnection connection = ime.getCurrentInputConnection();
                  if (connection == null) {
                      logError("action failed: no input connection", null);
                      return;
                  }

                  boolean success;
                  if (isParagraphAction(action)) {
                      success = performParagraphAction(connection, action);
                  } else {
                      success = performMenuAction(ime, connection, Config.menuIdFor(action));
                  }
                  if (!success) logError(actionName + " failed: target editor rejected action", null);
              } catch (Throwable throwable) {
                  logError("action failed", throwable);
              }
          }
          '''
          new_perform = '''    private void performAction(Context context, int action, String key) {
              String actionName = Config.actionName(action);
              try {
                  InputMethodService ime = imeRef.get();
                  if (ime == null) ime = findIme(context);
                  if (ime == null) {
                      logError("action failed: no input method service", null);
                      return;
                  }
                  imeRef = new WeakReference<>(ime);

                  EditorInfo editorInfo = ime.getCurrentInputEditorInfo();
                  if (editorInfo != null && isPassword(editorInfo.inputType)) return;

                  if (isNativePanelAction(action)) {
                      if (!openNativePanel(ime, action)) {
                          logError(actionName + " failed: native entry not found", null);
                      }
                      return;
                  }

                  InputConnection connection = ime.getCurrentInputConnection();
                  if (connection == null) {
                      logError("action failed: no input connection", null);
                      return;
                  }

                  boolean success;
                  if (isParagraphAction(action)) {
                      success = performParagraphAction(connection, action);
                  } else {
                      success = performMenuAction(ime, connection, Config.menuIdFor(action));
                  }
                  if (!success) logError(actionName + " failed: target editor rejected action", null);
              } catch (Throwable throwable) {
                  logError("action failed", throwable);
              }
          }

          private static boolean isNativePanelAction(int action) {
              return action == Config.ACTION_OPEN_CLIPBOARD
                      || action == Config.ACTION_OPEN_QUICK_PHRASE;
          }

          private boolean openNativePanel(InputMethodService ime, int action) {
              View root = imeRootView(ime);
              if (root == null) return false;

              String[] targets = action == Config.ACTION_OPEN_CLIPBOARD
                      ? new String[]{"剪贴板", "clipboard", "clip_board"}
                      : new String[]{"快捷发送", "常用语", "快捷语", "quickphrase", "quick_phrase", "commonphrase", "common_phrase"};

              if (clickMatchingView(root, targets)) {
                  logInfo(Config.actionName(action) + " native entry clicked");
                  return true;
              }

              String[] moreTargets = {"更多", "more", "tool_more", "toolbar_more", "expand_tools"};
              if (!clickMatchingView(root, moreTargets)) return false;

              root.postDelayed(() -> {
                  View latestRoot = imeRootView(ime);
                  if (latestRoot == null || !clickMatchingView(latestRoot, targets)) {
                      logError(Config.actionName(action) + " failed after opening more panel", null);
                  } else {
                      logInfo(Config.actionName(action) + " native entry clicked from more panel");
                  }
              }, 240L);
              return true;
          }

          private static View imeRootView(InputMethodService ime) {
              try {
                  if (ime == null || ime.getWindow() == null || ime.getWindow().getWindow() == null) return null;
                  return ime.getWindow().getWindow().getDecorView();
              } catch (Throwable ignored) {
                  return null;
              }
          }

          private boolean clickMatchingView(View root, String[] tokens) {
              View match = findMatchingView(root, tokens);
              if (match == null) return false;
              View clickable = nearestClickable(match);
              if (clickable == null) return false;
              try {
                  return clickable.performClick();
              } catch (Throwable throwable) {
                  logError("native panel click failed", throwable);
                  return false;
              }
          }

          private View findMatchingView(View view, String[] tokens) {
              if (view == null || view.getVisibility() != View.VISIBLE || !view.isShown()) return null;
              String descriptor = describeView(view);
              for (String token : tokens) {
                  if (!token.isEmpty() && descriptor.contains(normalizeDescriptor(token))) return view;
              }
              if (view instanceof ViewGroup) {
                  ViewGroup group = (ViewGroup) view;
                  for (int i = 0; i < group.getChildCount(); i++) {
                      View result = findMatchingView(group.getChildAt(i), tokens);
                      if (result != null) return result;
                  }
              }
              return null;
          }

          private static View nearestClickable(View view) {
              View current = view;
              for (int depth = 0; current != null && depth < 6; depth++) {
                  if (current.isEnabled() && current.isClickable()) return current;
                  Object parent = current.getParent();
                  current = parent instanceof View ? (View) parent : null;
              }
              return view.isEnabled() ? view : null;
          }

          private static String describeView(View view) {
              StringBuilder value = new StringBuilder(128);
              if (view instanceof TextView) value.append(((TextView) view).getText()).append(' ');
              CharSequence description = view.getContentDescription();
              if (description != null) value.append(description).append(' ');
              Object tag = view.getTag();
              if (tag != null) value.append(tag).append(' ');
              value.append(view.getClass().getName()).append(' ');
              int id = view.getId();
              if (id != View.NO_ID) {
                  try { value.append(view.getResources().getResourceEntryName(id)); }
                  catch (Throwable ignored) { value.append(id); }
              }
              return normalizeDescriptor(value.toString());
          }

          private static String normalizeDescriptor(String value) {
              if (value == null) return "";
              return value.toLowerCase(Locale.ROOT)
                      .replace(" ", "")
                      .replace("_", "")
                      .replace("-", "");
          }
          '''
          replace(hook, old_perform, new_perform)

          gradle = "app/build.gradle.kts"
          replace(gradle, 'versionCode = 21\n        versionName = "1.9.4"',
                          'versionCode = 22\n        versionName = "1.10.0"')

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")
          text = text.replace("当前稳定版本：v1.9.4", "当前稳定版本：v1.10.0")
          text = text.replace("releases/download/v1.9.4/WeType_Swipe_LSPosed_v1.9.4.apk",
                              "releases/download/v1.10.0/WeType_Swipe_LSPosed_v1.10.0.apk")
          text = text.replace("直接下载 v1.9.4 APK", "直接下载 v1.10.0 APK")
          marker = "## v1.9.4\n"
          section = "## v1.10.0\n\n- 新增下滑打开微信输入法原生剪贴板\n- 新增下滑打开微信输入法原生快捷发送（常用语）\n- 支持从工具栏或更多工具面板动态定位原生入口\n- 原生入口识别失败时安全退出，不影响正常输入\n\n"
          if section not in text:
              if marker not in text: raise SystemExit("README version marker missing")
              text = text.replace(marker, section + marker, 1)
          readme.write_text(text, encoding="utf-8")

          release = Path(".github/workflows/release.yml")
          text = release.read_text(encoding="utf-8")
          text = text.replace("release-v1.9.4", "release-v1.10.0")
          text = text.replace('VERSION: "1.9.4"', 'VERSION: "1.10.0"')
          text = text.replace('TAG: "v1.9.4"', 'TAG: "v1.10.0"')
          start = text.index("          ### 新增功能\n")
          end = text.index("          EOF\n", start)
          notes = '''          ### 新增功能

          - 剪贴板：下滑直接打开微信输入法原生剪贴板面板
          - 快捷发送：下滑直接打开微信输入法原生快捷发送（常用语）面板
          - 26 键和九宫格均可绑定这两个原生面板动作

          ### 实现改进

          - 优先识别当前工具栏中的原生入口
          - 入口位于“更多”时自动打开更多工具并继续定位
          - 识别失败时安全退出，不影响正常输入
'''
          text = text[:start] + notes + text[end:]
          release.write_text(text, encoding="utf-8")
          PY

      - name: 编译校验
        run: gradle --no-daemon clean assembleDebug

      - name: 提交 v1.10.0
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/prepare-v1.10.0.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add native clipboard and quick phrase panels"
          git push origin main
