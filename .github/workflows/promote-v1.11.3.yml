name: 固化 v1.11.3 正式源码

on:
  push:
    branches:
      - codex/release-v1.11.3
    paths:
      - ".github/workflows/promote-v1.11.3.yml"

permissions:
  contents: write

concurrency:
  group: promote-v1.11.3
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出发布分支
        uses: actions/checkout@v4
        with:
          ref: codex/release-v1.11.3
          fetch-depth: 0

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 应用已通过真机验证的修复
        shell: bash
        run: python3 tools/patch_wetype_352_regression_test.py

      - name: 固化正式版本与发布文档
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          root = Path.cwd()

          main_hook = root / "app/src/main/java/com/rww/wetypeswipe/MainHook.java"
          text = main_hook.read_text(encoding="utf-8")
          old = 'logInfo("v1.11.3-test1 entered target package; native-panel structural adapter enabled");'
          new = 'logInfo("v1.11.3 entered target package; native-panel structural adapter enabled");'
          if text.count(old) != 1:
              raise SystemExit("MainHook formal version marker mismatch")
          main_hook.write_text(text.replace(old, new, 1), encoding="utf-8")

          activity = root / "app/src/main/java/com/rww/wetypeswipe/MainActivity.java"
          text = activity.read_text(encoding="utf-8")
          old = "v1.11.3-test1 · 修复原生面板与符号页标签"
          new = "v1.11.3 · 修复原生面板与符号页标签"
          if text.count(old) != 1:
              raise SystemExit("MainActivity formal version marker mismatch")
          activity.write_text(text.replace(old, new, 1), encoding="utf-8")

          properties = root / "gradle.properties"
          text = properties.read_text(encoding="utf-8")
          if "VERSION_CODE=41" not in text or "VERSION_NAME=1.11.3-test1" not in text:
              raise SystemExit("gradle.properties test version mismatch")
          properties.write_text(
              text.replace("VERSION_NAME=1.11.3-test1", "VERSION_NAME=1.11.3", 1),
              encoding="utf-8",
          )

          readme = root / "README.md"
          text = readme.read_text(encoding="utf-8")
          if "当前稳定版本：**v1.11.2**" not in text:
              raise SystemExit("README stable version mismatch")
          text = text.replace("当前稳定版本：**v1.11.2**", "当前稳定版本：**v1.11.3**", 1)
          start = text.index("## v1.11.2 更新内容")
          end = text.index("\n## 兼容性", start)
          section = """## v1.11.3 更新内容

          - 修复部分微信输入法 3.5.2 构建中下滑打开原生剪贴板失效。
          - 修复下滑打开快捷发送／常用语失效。
          - 原生工具栏入口改为“已知字段快速匹配 + 结构特征回退”，降低同版本不同混淆构建造成的兼容风险。
          - 修复数字／符号页面错误显示 QWERTY 下滑功能标签。
          - 切换字母、数字和符号页面时，根据当前可见按键重新判定标签，避免复用旧缓存。

          完整变更请查看 [v1.11.3 Release](https://github.com/waoui/WeType-Swipe/releases/tag/v1.11.3) 和 [更新记录](CHANGELOG.md)。
          """
          section = "\n".join(line[10:] if line.startswith("          ") else line for line in section.splitlines()) + "\n"
          readme.write_text(text[:start] + section + text[end:], encoding="utf-8")

          changelog = root / "CHANGELOG.md"
          text = changelog.read_text(encoding="utf-8")
          prefix = "# 更新记录\n"
          if not text.startswith(prefix):
              raise SystemExit("CHANGELOG header mismatch")
          entry = """# 更新记录

          ## v1.11.3

          - 修复部分微信输入法 3.5.2 构建中原生剪贴板、快捷发送／常用语入口失效
          - 原生工具栏回调由固定混淆类名匹配改为已知字段快速匹配和结构特征回退
          - 修复数字／符号页面错误显示 QWERTY 下滑功能标签
          - 标签缓存加入当前可见按键身份，切换键盘层后不会复用旧标签
          - 保持原有配置格式、默认键位和 3.5.0 兼容逻辑不变
          """
          entry = "\n".join(line[10:] if line.startswith("          ") else line for line in entry.splitlines()) + "\n"
          changelog.write_text(entry + text[len(prefix):], encoding="utf-8")

          notes = """# 微信输入法下滑快捷键 v1.11.3

          本版本修复微信输入法 3.5.2 部分构建中的原生面板兼容问题，并修正数字／符号页面错误显示下滑标签的问题。

          ## 修复内容

          - 修复下滑打开微信输入法原生剪贴板失效。
          - 修复下滑打开快捷发送／常用语失效。
          - 原生工具栏入口不再依赖单一混淆监听器类名，改为“已知字段快速匹配 + 结构特征回退”。
          - 修复数字／符号页面错误显示“剪贴、快捷、选前、选后、段首”等 QWERTY 功能标签。
          - 切换字母、数字和符号页面时，根据当前可见按键重新判定并缓存标签。

          ## 兼容性

          - Android 8.0 及以上
          - LSPosed
          - 微信输入法 3.5.0、3.5.2
          - 本次真机验证环境：Android 16、微信输入法 3.5.2

          ## 升级说明

          可直接覆盖安装 v1.11.2。升级后建议强制停止并重新启动微信输入法；原有键位映射、自定义标签和开关配置保持不变。

          ## 发布验证

          - 单元测试、Android Lint、Release 构建通过
          - 永久发布证书 SHA-256 校验通过
          - 26 键与九宫格原生剪贴板、快捷发送／常用语真机验证通过
          - 两级数字／符号页面标签显示验证通过
          - 正常点击、长按、滑行输入未发现回归
          """
          notes = "\n".join(line[10:] if line.startswith("          ") else line for line in notes.splitlines()) + "\n"
          (root / "RELEASE_NOTES_v1.11.3.md").write_text(notes, encoding="utf-8")
          PY

          rm -f TEST_NOTES_v1.11.3-test1.md
          rm -f tools/patch_wetype_352_regression_test.py
          rm -f .github/workflows/build-wetype-352-regression-test.yml
          rm -f .github/workflows/promote-v1.11.3.yml

      - name: 单元测试、Lint 与调试构建
        shell: bash
        run: ./gradlew --no-daemon --stacktrace clean testDebugUnitTest lintDebug assembleDebug

      - name: 提交正式源码
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "发布 v1.11.3：修复原生面板与符号页标签"
          git push origin HEAD:codex/release-v1.11.3
