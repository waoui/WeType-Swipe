name: 构建 v1.11.2-test1 微信输入法 3.5.2 测试包

on:
  push:
    branches:
      - test/wetype-3.5.2-v1.11.2-test1
    paths:
      - "tools/patch_wetype_352_test.py"
      - ".github/workflows/build-wetype-352-test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wetype-352-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
      SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      EXPECTED_CERT_SHA256: 1082df3bac441e9bd020ce640d66924de6c7dfb70836b262743e15777863c93a

    steps:
      - name: 检出测试分支
        uses: actions/checkout@v4

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 应用 3.5.2 兼容补丁
        shell: bash
        run: python3 tools/patch_wetype_352_test.py

      - name: 恢复永久签名证书
        shell: bash
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEY_BASE64"
          test -n "$SIGNING_STORE_PASSWORD"
          test -n "$SIGNING_KEY_ALIAS"
          test -n "$SIGNING_KEY_PASSWORD"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > "$SIGNING_STORE_FILE"

      - name: 单元测试、Lint 与编译
        shell: bash
        run: ./gradlew --no-daemon --stacktrace clean testDebugUnitTest lintDebug assembleRelease

      - name: 校验签名并整理测试附件
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts source-package/WeType-Swipe-v1.11.2-test1
          apk="artifacts/WeType_Swipe_LSPosed_v1.11.2-test1.apk"
          source_zip="artifacts/WeType_Swipe_LSPosed_v1.11.2-test1_source.zip"
          sums="artifacts/WeType_Swipe_v1.11.2-test1_SHA256SUMS.txt"

          cp app/build/outputs/apk/release/app-release.apk "$apk"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$apksigner"
          verification="$($apksigner verify --verbose --print-certs "$apk")"
          printf '%s\n' "$verification"
          cert_digest="$(printf '%s\n' "$verification" |
            sed -n 's/^Signer #1 certificate SHA-256 digest: //p' |
            tr '[:upper:]' '[:lower:]')"
          test "$cert_digest" = "$EXPECTED_CERT_SHA256"

          rsync -a ./ source-package/WeType-Swipe-v1.11.2-test1/ \
            --exclude '.git/' \
            --exclude '.gradle/' \
            --exclude '**/build/' \
            --exclude 'artifacts/' \
            --exclude 'source-package/' \
            --exclude 'signing.jks'
          (cd source-package && zip -qr "../$source_zip" WeType-Swipe-v1.11.2-test1)
          cp TEST_NOTES_v1.11.2-test1.md artifacts/
          (cd artifacts && sha256sum \
            WeType_Swipe_LSPosed_v1.11.2-test1.apk \
            WeType_Swipe_LSPosed_v1.11.2-test1_source.zip \
            > "$(basename "$sums")")

      - name: 上传测试包
        uses: actions/upload-artifact@v4
        with:
          name: WeType-Swipe-v1.11.2-test1-signed
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: 清理签名文件
        if: always()
        shell: bash
        run: rm -f signing.jks
