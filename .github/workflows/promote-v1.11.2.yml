name: 提交 v1.11.2 正式源码

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/promote-v1.11.2.yml"

permissions:
  contents: write

concurrency:
  group: promote-v1.11.2
  cancel-in-progress: false

jobs:
  promote:
    if: github.repository_owner == github.actor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出主分支
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 应用已验证的 3.5.2 兼容补丁
        shell: bash
        run: python3 tools/promote_v1_11_2.py

      - name: 校验正式源码状态
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'VERSION_CODE=40' gradle.properties
          grep -F 'VERSION_NAME=1.11.2' gradle.properties
          grep -F 'com.tencent.wetype.plugin.hld.utils.o1' app/src/main/java/com/rww/wetypeswipe/MainHook.java
          grep -F 'com.tencent.wetype.plugin.hld.toolbar.A$b' app/src/main/java/com/rww/wetypeswipe/MainHook.java
          test -s RELEASE_NOTES_v1.11.2.md
          test ! -e tools/promote_v1_11_2.py
          test ! -e .github/workflows/promote-v1.11.2.yml

      - name: 提交到主分支
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'release: v1.11.2'
          git push origin HEAD:main
