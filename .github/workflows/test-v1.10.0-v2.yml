name: 构建 v1.10.0 测试包 v2

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/test-v1.10.0-v2.yml"
      - "tools/patch_v110_test.py"

permissions:
  contents: read

jobs:
  build-test-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: 临时写入 v1.10.0-test1 功能
        run: python3 tools/patch_v110_test.py

      - name: 恢复正式签名证书
        shell: bash
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          test -n "$SIGNING_KEY_BASE64"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > signing.jks

      - name: 编译同签名测试包
        shell: bash
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: gradle --no-daemon clean assembleRelease

      - name: 整理测试 APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release.apk output/WeType_Swipe_LSPosed_v1.10.0-test1.apk

      - uses: actions/upload-artifact@v4
        with:
          name: WeType-Swipe-v1.10.0-test1
          path: output/WeType_Swipe_LSPosed_v1.10.0-test1.apk
          retention-days: 7

      - if: always()
        run: rm -f signing.jks
