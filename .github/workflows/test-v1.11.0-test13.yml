name: 构建 v1.11.0-test16 原生绘制热路径优化测试包

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/patch_v111_test16_hot_path_core.py"
      - "tools/patch_v111_test16_hot_path_final.py"
      - ".github/workflows/test-v1.11.0-test13.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: keyboard-hint-v1.11.0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: 写入 test16 热路径优化
        run: python3 tools/patch_v111_test16_hot_path_final.py
      - name: 恢复正式签名证书
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          test -n "$SIGNING_KEY_BASE64"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > signing.jks
      - name: 编译同签名测试包
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: gradle --no-daemon clean assembleRelease
      - name: 整理测试 APK
        run: |
          mkdir -p artifact
          cp app/build/outputs/apk/release/app-release.apk artifact/WeType_Swipe_LSPosed_v1.11.0-test16.apk
          sha256sum artifact/WeType_Swipe_LSPosed_v1.11.0-test16.apk
      - uses: actions/upload-artifact@v4
        with:
          name: WeType-Swipe-v1.11.0-test16
          path: artifact/WeType_Swipe_LSPosed_v1.11.0-test16.apk
      - if: always()
        run: rm -f signing.jks
