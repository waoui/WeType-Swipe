          base64 --decode /tmp/ddz-android-src.b64 > /tmp/ddz-android-src.tar.gz
          tar -xzf /tmp/ddz-android-src.tar.gz

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android 35 构建组件
        shell: bash
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 编译 Debug APK
        shell: bash
        run: ./gradlew -p ddz-android --no-daemon --stacktrace assembleDebug

      - name: 整理 APK
        shell: bash
        run: |
          mkdir -p artifacts
          cp ddz-android/app/build/outputs/apk/debug/app-debug.apk artifacts/DdzAiTrainer-v0.1.1-debug.apk
          sha256sum artifacts/*.apk > artifacts/SHA256SUMS.txt

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: DdzAiTrainer-v0.1.1-Android
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
