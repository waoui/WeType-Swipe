name: Publish v1.11.1 via Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: github.event.issue.title == 'Publish v1.11.1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate formal v1.11.1 source
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/patch_v1111_test1_compile_fix.py
          python3 - <<'PY'
          from pathlib import Path
          import re

          hook = Path('app/src/main/java/com/rww/wetypeswipe/MainHook.java')
          text = hook.read_text(encoding='utf-8')
          text = text.replace('v1.11.1-test1 entered target package', 'v1.11.1 entered target package')
          hook.write_text(text, encoding='utf-8')

          activity = Path('app/src/main/java/com/rww/wetypeswipe/MainActivity.java')
          text = activity.read_text(encoding='utf-8')
          text = text.replace('v1.11.1-test1 · 全复制、全剪切与自定义标签', 'v1.11.1 · 全复制、全剪切与自定义标签')
          activity.write_text(text, encoding='utf-8')

          build = Path('app/build.gradle.kts')
          text = build.read_text(encoding='utf-8')
          text = re.sub(r'versionCode\s*=\s*\d+', 'versionCode = 39', text, count=1)
          text = re.sub(r'versionName\s*=\s*"[^"]+"', 'versionName = "1.11.1"', text, count=1)
          build.write_text(text, encoding='utf-8')

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          text = text.replace('当前稳定版本：**v1.11.0**', '当前稳定版本：**v1.11.1**')
          section = '''## v1.11.1 更新内容

- 新增“复制全部”：自动全选并复制全部文本，完成后恢复原光标或选区。
- 新增“剪切全部”：自动全选并剪切全部文本，失败时恢复原选区。
- 26 键和九宫格支持长按按键设置显示标签。
- 标签支持自动、自定义和隐藏三种模式，自定义内容最多 4 个字符。
- 保留全局“显示按键底部功能文字”总开关。
- 配置保存后立即刷新原生单键文字缓存。

'''
          marker = '## 兼容性'
          if '## v1.11.1 更新内容' not in text and marker in text:
              text = text.replace(marker, section + marker, 1)
          readme.write_text(text, encoding='utf-8')

          Path('release-notes-v1.11.1.md').write_text('''# 微信输入法下滑快捷键 v1.11.1

## 新增功能

- **复制全部**：全选当前输入框内容并复制，随后恢复原光标或选区。
- **剪切全部**：全选当前输入框内容并剪切；执行失败时恢复原选区。
- **自定义按键标签**：26 键和九宫格均可长按按键设置标签。
- 标签支持自动、自定义和隐藏三种模式，自定义内容最多 4 个字符。

## 使用说明

- 点击按键设置下滑动作。
- 长按按键设置该按键的显示标签。
- 全局“显示按键底部功能文字”开关仍可统一控制所有标签。
- 安装后请在 LSPosed 中启用模块，并重启微信输入法进程。

## 兼容性

- Android 8.0 及以上
- LSPosed
- 安卓版微信输入法
- 当前主要验证版本：微信输入法 3.5.0
''', encoding='utf-8')
          PY
          ! grep -R "1.11.1-test1" app/src/main app/build.gradle.kts

      - name: Restore release signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEY_BASE64"
          echo "$SIGNING_KEY_BASE64" | base64 -d > signing.jks

      - name: Build signed release APK
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          gradle --no-daemon --console=plain clean assembleRelease
          mkdir -p release-out
          cp app/build/outputs/apk/release/app-release.apk release-out/WeType_Swipe_LSPosed_v1.11.1.apk

      - name: Commit formal source and clean test assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f \
            .github/workflows/test-v1.11.1-actions-labels.yml \
            .github/workflows/publish-v1.11.1-issue.yml \
            tools/patch_v1111_test1_actions_labels.py \
            tools/patch_v1111_test1_compile_fix.py
          git add app/src/main/java/com/rww/wetypeswipe/Config.java \
                  app/src/main/java/com/rww/wetypeswipe/MainActivity.java \
                  app/src/main/java/com/rww/wetypeswipe/MainHook.java \
                  app/build.gradle.kts README.md
          git commit -m "release: v1.11.1"
          git push origin main

      - name: Package source and checksums
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=zip --output=release-out/WeType_Swipe_LSPosed_v1.11.1_source.zip HEAD
          (
            cd release-out
            sha256sum WeType_Swipe_LSPosed_v1.11.1.apk WeType_Swipe_LSPosed_v1.11.1_source.zip > WeType_Swipe_v1.11.1_SHA256SUMS.txt
          )
          cat release-out/WeType_Swipe_v1.11.1_SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create v1.11.1 \
            release-out/WeType_Swipe_LSPosed_v1.11.1.apk \
            release-out/WeType_Swipe_LSPosed_v1.11.1_source.zip \
            release-out/WeType_Swipe_v1.11.1_SHA256SUMS.txt \
            --target main \
            --title "微信输入法下滑快捷键 v1.11.1" \
            --notes-file release-notes-v1.11.1.md \
            --latest

      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "v1.11.1 已发布。"

      - name: Clean signing key
        if: always()
        run: rm -f signing.jks