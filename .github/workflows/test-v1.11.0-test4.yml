name: 构建 v1.11.0-test12 原生布局自动刷新测试包

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/patch_v111_test12_native_refresh.py"
      - ".github/workflows/test-v1.11.0-test4.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: keyboard-hint-v1.11.0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: 写入 test12 原生布局刷新逻辑
        shell: bash
        run: |
          set -o pipefail
          python3 tools/patch_v111_test12_native_refresh.py 2>&1 | tee test12_patch.log

      - name: 上传补丁日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test12-patch-log
          path: test12_patch.log
          if-no-files-found: ignore

      - name: 恢复正式签名证书
        shell: bash
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          test -n "$SIGNING_KEY_BASE64"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > signing.jks

      - name: 编译同签名测试包
        shell: bash
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -o pipefail
          gradle --no-daemon clean assembleRelease 2>&1 | tee test12_build.log

      - name: 上传编译日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test12-build-log
          path: test12_build.log
          if-no-files-found: ignore

      - name: 整理测试 APK
        shell: bash
        run: |
          mkdir -p artifact
          cp app/build/outputs/apk/release/app-release.apk artifact/WeType_Swipe_LSPosed_v1.11.0-test12.apk
          sha256sum artifact/WeType_Swipe_LSPosed_v1.11.0-test12.apk

      - uses: actions/upload-artifact@v4
        with:
          name: WeType-Swipe-v1.11.0-test12
          path: artifact/WeType_Swipe_LSPosed_v1.11.0-test12.apk

      - if: always()
        run: rm -f signing.jks
