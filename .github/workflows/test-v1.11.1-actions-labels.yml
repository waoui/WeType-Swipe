name: Build v1.11.1-test1

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v1.11.1-actions-labels
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Apply patch
        run: python3 tools/patch_v1111_test1_actions_labels.py
      - name: Build
        run: gradle --no-daemon clean assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: WeType-Swipe-v1.11.1-test1-unsigned
          path: app/build/outputs/apk/release/app-release.apk
