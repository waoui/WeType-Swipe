name: Build v1.11.1 release candidate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Prepare formal source
        run: python3 tools/prepare_v1111_release.py

      - name: Restore signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          test -n "$SIGNING_KEY_BASE64"
          echo "$SIGNING_KEY_BASE64" | base64 -d > signing.jks

      - name: Build signed APK
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          gradle --no-daemon --console=plain clean assembleRelease
          mkdir -p artifact/source
          cp app/build/outputs/apk/release/app-release.apk artifact/WeType_Swipe_LSPosed_v1.11.1.apk
          cp -R app artifact/source/
          cp README.md settings.gradle.kts build.gradle.kts gradle.properties artifact/source/
          cd artifact/source
          zip -qr ../WeType_Swipe_LSPosed_v1.11.1_source.zip .
          cd ..
          sha256sum WeType_Swipe_LSPosed_v1.11.1.apk WeType_Swipe_LSPosed_v1.11.1_source.zip > WeType_Swipe_v1.11.1_SHA256SUMS.txt
          cat WeType_Swipe_v1.11.1_SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: WeType-Swipe-v1.11.1-release-candidate
          path: |
            artifact/WeType_Swipe_LSPosed_v1.11.1.apk
            artifact/WeType_Swipe_LSPosed_v1.11.1_source.zip
            artifact/WeType_Swipe_v1.11.1_SHA256SUMS.txt

      - if: always()
        run: rm -f signing.jks