name: Build v1.11.1-test1

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v1.11.1-actions-labels
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Apply patch
        run: python3 tools/patch_v1111_test1_actions_labels.py
      - name: Build
        shell: bash
        run: |
          mkdir -p artifact
          set +e
          gradle --no-daemon --console=plain clean assembleRelease > artifact/build.log 2>&1
          code=$?
          tail -n 220 artifact/build.log
          exit $code
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WeType-Swipe-v1.11.1-test1-build
          path: |
            artifact/build.log
            app/build/outputs/apk/release/app-release.apk
