name: Build v1.11.1-test1

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v1.11.1-actions-labels
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Apply patch
        run: python3 tools/patch_v1111_test1_compile_fix.py
      - name: Restore signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          test -n "$SIGNING_KEY_BASE64"
          echo "$SIGNING_KEY_BASE64" | base64 -d > signing.jks
      - name: Build
        shell: bash
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          mkdir -p artifact
          set +e
          gradle --no-daemon --console=plain clean assembleRelease > artifact/build.log 2>&1
          code=$?
          tail -n 220 artifact/build.log
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk artifact/WeType_Swipe_LSPosed_v1.11.1-test1.apk
            sha256sum artifact/WeType_Swipe_LSPosed_v1.11.1-test1.apk
          fi
          exit $code
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WeType-Swipe-v1.11.1-test1
          path: |
            artifact/build.log
            artifact/WeType_Swipe_LSPosed_v1.11.1-test1.apk
      - if: always()
        run: rm -f signing.jks
