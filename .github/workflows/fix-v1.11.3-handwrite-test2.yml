name: 修复手写找字并构建 v1.11.3-test2

on:
  push:
    branches:
      - codex/release-v1.11.3
    paths:
      - ".github/workflows/fix-v1.11.3-handwrite-test2.yml"

permissions:
  contents: write

concurrency:
  group: fix-v1.11.3-handwrite-test2
  cancel-in-progress: false

jobs:
  fix-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SIGNING_STORE_FILE: ${{ github.workspace }}/signing.jks
      SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
      SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      EXPECTED_CERT_SHA256: 1082df3bac441e9bd020ce640d66924de6c7dfb70836b262743e15777863c93a

    steps:
      - name: 检出正式发布分支
        uses: actions/checkout@v4
        with:
          ref: codex/release-v1.11.3
          fetch-depth: 0

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 应用手写键盘隔离修复
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          root = Path.cwd()
          hook = root / "app/src/main/java/com/rww/wetypeswipe/MainHook.java"
          text = hook.read_text(encoding="utf-8")

          replacements = [
              (
                  '''        ensureKeyboardLabelDrawHook(view.getClass(), view);
          if (event.getActionMasked() == MotionEvent.ACTION_DOWN && !targetCacheLoaded) {''',
                  '''        if (isHandwritingContext(view)) {
              tracker.clear(view);
              view.post(() -> hideKeyboardHint(0L));
              return chain.proceed();
          }

          ensureKeyboardLabelDrawHook(view.getClass(), view);
          if (event.getActionMasked() == MotionEvent.ACTION_DOWN && !targetCacheLoaded) {'''
              ),
              (
                  '''        if (keyboard == null || drawRect == null || drawRect.isEmpty()) return;

          View previous = nativeSingleKeyActiveKeyboardRef.get();''',
                  '''        if (keyboard == null || drawRect == null || drawRect.isEmpty()) return;
          if (isHandwritingContext(keyboard)) {
              nativeSingleKeyLabelCache.remove(model);
              return;
          }

          View previous = nativeSingleKeyActiveKeyboardRef.get();'''
              ),
              (
                  '''    private void drawKeyboardFunctionLabels(View keyboard, Canvas canvas) {
          if (keyboard == null || canvas == null || keyboard.getWidth() <= 0 || keyboard.getHeight() <= 0) return;
          Config config = cachedConfig;''',
                  '''    private void drawKeyboardFunctionLabels(View keyboard, Canvas canvas) {
          if (keyboard == null || canvas == null || keyboard.getWidth() <= 0 || keyboard.getHeight() <= 0) return;
          if (isHandwritingContext(keyboard)) return;
          Config config = cachedConfig;'''
              ),
              (
                  '''    private static Class<?> findKeyboardBase(Class<?> type) {
          for (int i = 0; type != null && i < 12; i++, type = type.getSuperclass()) {
              if (KEYBOARD_BASE.equals(type.getName())) return type;
          }
          return null;
      }

      private Object interceptKeyboardTouch''',
                  '''    private static Class<?> findKeyboardBase(Class<?> type) {
          for (int i = 0; type != null && i < 12; i++, type = type.getSuperclass()) {
              if (KEYBOARD_BASE.equals(type.getName())) return type;
          }
          return null;
      }

      private static boolean isHandwritingContext(View keyboard) {
          View current = keyboard;
          for (int depth = 0; current != null && depth < 16; depth++) {
              if (KeyboardModeGuard.isHandwritingClassName(current.getClass().getName())) return true;
              Object parent = current.getParent();
              current = parent instanceof View ? (View) parent : null;
          }
          return false;
      }

      private Object interceptKeyboardTouch'''
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"MainHook replacement expected 1 match, found {count}: {old[:80]!r}")
              text = text.replace(old, new, 1)
          hook.write_text(text, encoding="utf-8")

          guard = root / "app/src/main/java/com/rww/wetypeswipe/KeyboardModeGuard.java"
          guard.write_text('''package com.rww.wetypeswipe;

          import java.util.Locale;

          final class KeyboardModeGuard {
              private KeyboardModeGuard() {}

              static boolean isHandwritingClassName(String className) {
                  if (className == null || className.isEmpty()) return false;
                  String normalized = className.toLowerCase(Locale.ROOT);
                  return normalized.contains("handwrite") || normalized.contains("hand_write");
              }
          }
          '''.replace("          ", ""), encoding="utf-8")

          test = root / "app/src/test/java/com/rww/wetypeswipe/KeyboardModeGuardTest.java"
          test.write_text('''package com.rww.wetypeswipe;

          import static org.junit.Assert.assertFalse;
          import static org.junit.Assert.assertTrue;

          import org.junit.Test;

          public final class KeyboardModeGuardTest {
              @Test public void identifiesKnownHandwritingKeyboards() {
                  assertTrue(KeyboardModeGuard.isHandwritingClassName(
                          "com.tencent.wetype.plugin.hld.keyboard.selfdraw.HandWriteKeyboard"));
                  assertTrue(KeyboardModeGuard.isHandwritingClassName(
                          "com.tencent.wetype.plugin.hld.keyboard.selfdraw.HandWriteFullScreenKeyboard"));
                  assertTrue(KeyboardModeGuard.isHandwritingClassName(
                          "com.tencent.wetype.plugin.hld.keyboard.selfdraw.S27HandwriteT9Keyboard"));
                  assertTrue(KeyboardModeGuard.isHandwritingClassName(
                          "com.tencent.wetype.plugin.hld.keyboard.selfdraw.S28HandwriteT26Keyboard"));
                  assertTrue(KeyboardModeGuard.isHandwritingClassName(
                          "com.tencent.wetype.plugin.hld.handwrite.ImeHandWriteKeyboardView"));
              }

              @Test public void keepsNormalKeyboardsEnabled() {
                  assertFalse(KeyboardModeGuard.isHandwritingClassName(null));
                  assertFalse(KeyboardModeGuard.isHandwritingClassName(""));
                  assertFalse(KeyboardModeGuard.isHandwritingClassName(
                          "com.tencent.wetype.plugin.hld.keyboard.selfdraw.QwertyKeyboard"));
                  assertFalse(KeyboardModeGuard.isHandwritingClassName(
                          "com.tencent.wetype.plugin.hld.keyboard.selfdraw.S27T9Keyboard"));
              }
          }
          '''.replace("          ", ""), encoding="utf-8")

          docs = [
              (root / "CHANGELOG.md",
               "- 修复数字／符号页面错误显示 QWERTY 下滑功能标签\n",
               "- 修复数字／符号页面错误显示 QWERTY 下滑功能标签\n- 手写找字及其他手写键盘界面不再显示或触发下滑快捷动作\n"),
              (root / "README.md",
               "- 修复数字／符号页面错误显示 QWERTY 下滑功能标签。\n",
               "- 修复数字／符号页面错误显示 QWERTY 下滑功能标签。\n- 手写找字及其他手写键盘界面不显示标签，也不响应下滑快捷动作。\n"),
              (root / "RELEASE_NOTES_v1.11.3.md",
               "- 修复数字／符号页面错误显示“剪贴、快捷、选前、选后、段首”等 QWERTY 功能标签。\n",
               "- 修复数字／符号页面错误显示“剪贴、快捷、选前、选后、段首”等 QWERTY 功能标签。\n- 手写找字及其他手写键盘界面不再显示标签或执行下滑动作，避免干扰手写操作。\n"),
          ]
          for path, old, new in docs:
              value = path.read_text(encoding="utf-8")
              if value.count(old) != 1:
                  raise SystemExit(f"Documentation marker mismatch: {path}")
              path.write_text(value.replace(old, new, 1), encoding="utf-8")
          PY

          rm -f .github/workflows/fix-v1.11.3-handwrite-test2.yml

      - name: 单元测试、Lint 与调试构建
        shell: bash
        run: ./gradlew --no-daemon --stacktrace clean testDebugUnitTest lintDebug assembleDebug

      - name: 提交正式修复源码
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "修复手写找字界面误触发下滑快捷动作"
          git push origin HEAD:codex/release-v1.11.3

      - name: 准备 v1.11.3-test2 标识
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/^VERSION_NAME=1\.11\.3$/VERSION_NAME=1.11.3-test2/' gradle.properties
          sed -i 's/v1\.11\.3 · 修复原生面板与符号页标签/v1.11.3-test2 · 增加手写键盘隔离/' \
            app/src/main/java/com/rww/wetypeswipe/MainActivity.java
          sed -i 's/v1\.11\.3 entered target package/v1.11.3-test2 entered target package/' \
            app/src/main/java/com/rww/wetypeswipe/MainHook.java
          cat > TEST_NOTES_v1.11.3-test2.md <<'EOF'
          # 微信输入法下滑快捷键 v1.11.3-test2

          ## 新增修复

          - 手写找字及其他手写键盘界面不再显示下滑功能标签。
          - 手写键盘界面不再执行下滑快捷动作，避免影响手写和找字操作。
          - 保留 v1.11.3-test1 已验证的原生剪贴板、快捷发送／常用语和符号页标签修复。

          ## 真机验收

          1. 进入手写找字界面，确认“剪贴、快捷、段首、段尾、全选、全剪切、全复制、粘贴、选前、选后”等标签全部消失。
          2. 在原标签所在区域下滑，确认不会执行任何模块动作。
          3. 切回 26 键和九宫格，确认已绑定标签重新显示且下滑动作正常。
          4. 再次验证原生剪贴板和快捷发送／常用语。
          5. 检查数字／符号页面仍不显示错误标签。
          EOF
          sed -i 's/^          //' TEST_NOTES_v1.11.3-test2.md

      - name: 恢复永久签名证书
        shell: bash
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEY_BASE64"
          test -n "$SIGNING_STORE_PASSWORD"
          test -n "$SIGNING_KEY_ALIAS"
          test -n "$SIGNING_KEY_PASSWORD"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > "$SIGNING_STORE_FILE"

      - name: 构建正式签名测试包
        shell: bash
        run: ./gradlew --no-daemon --stacktrace assembleRelease

      - name: 校验签名并整理附件
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          apk="artifacts/WeType_Swipe_LSPosed_v1.11.3-test2.apk"
          source="artifacts/WeType_Swipe_LSPosed_v1.11.3-test2_source.zip"
          cp app/build/outputs/apk/release/app-release.apk "$apk"
          cp TEST_NOTES_v1.11.3-test2.md artifacts/

          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$apksigner"
          verification="$($apksigner verify --verbose --print-certs "$apk")"
          printf '%s\n' "$verification"
          normalized="$(printf '%s' "$verification" | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
          case "$normalized" in
            *"$EXPECTED_CERT_SHA256"*) ;;
            *) echo "Unexpected signing certificate" >&2; exit 1 ;;
          esac

          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path.cwd()
          output = root / "artifacts/WeType_Swipe_LSPosed_v1.11.3-test2_source.zip"
          prefix = Path("WeType-Swipe-v1.11.3-test2")
          excluded_dirs = {".git", ".gradle", ".idea", "build", "artifacts", "release", "source-package"}
          excluded_names = {"signing.jks", "local.properties"}
          with ZipFile(output, "w", ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob("*")):
                  relative = path.relative_to(root)
                  if any(part in excluded_dirs for part in relative.parts):
                      continue
                  if path.name in excluded_names or not path.is_file():
                      continue
                  archive.write(path, (prefix / relative).as_posix())
          PY

          (cd artifacts && sha256sum \
            WeType_Swipe_LSPosed_v1.11.3-test2.apk \
            WeType_Swipe_LSPosed_v1.11.3-test2_source.zip \
            > WeType_Swipe_v1.11.3-test2_SHA256SUMS.txt)

      - name: 上传 v1.11.3-test2
        uses: actions/upload-artifact@v4
        with:
          name: WeType-Swipe-v1.11.3-test2-signed
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: 清理签名文件
        if: always()
        shell: bash
        run: rm -f "$SIGNING_STORE_FILE"
