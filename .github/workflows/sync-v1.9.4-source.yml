name: Sync v1.9.4 source

on:
  push:
    branches: [main]
    paths:
      - "source-payload/v1.9.4/READY"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Rebuild source files
        run: |
          set -euo pipefail
          mkdir -p app/src/main/java/com/rww/wetypeswipe
          cat source-payload/v1.9.4/activity/part-* | base64 -d > app/src/main/java/com/rww/wetypeswipe/MainActivity.java
          cat source-payload/v1.9.4/hook/part-* | base64 -d > app/src/main/java/com/rww/wetypeswipe/MainHook.java
          echo "0a77302a450d8603278534bdd0d28d3979698fea5f2e89175331bc42e95aa695  app/src/main/java/com/rww/wetypeswipe/MainActivity.java" | sha256sum -c -
          echo "4eeb3d49274cad5f78cd0688dd0672f425e7aebff29dbe166f94fd6f41307dd9  app/src/main/java/com/rww/wetypeswipe/MainHook.java" | sha256sum -c -
      - name: Remove temporary sync files
        run: |
          rm -rf source-payload/v1.9.4
          rm -f .github/workflows/sync-v1.9.4-source.yml
      - name: Commit v1.9.4 source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: sync v1.9.4 source"
          git push origin main
