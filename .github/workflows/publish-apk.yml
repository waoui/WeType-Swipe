name: Publish APK

on:
  push:
    paths:
      - "release-payload/v1.7.0/READY"
  pull_request:
    paths:
      - "release-payload/v1.7.0/READY"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Rebuild APK
        id: rebuild
        continue-on-error: true
        run: |
          mkdir -p releases/v1.7.0
          {
            echo "Part sizes:"
            wc -c release-payload/v1.7.0/part-*
            echo
            echo "Part SHA-256:"
            sha256sum release-payload/v1.7.0/part-*
          } > release-payload/v1.7.0/DIAGNOSTIC.txt
          cat release-payload/v1.7.0/part-* | base64 -d > releases/v1.7.0/WeType-Swipe-v1.7.0.apk
          {
            echo
            echo "Rebuilt APK:"
            wc -c releases/v1.7.0/WeType-Swipe-v1.7.0.apk
            sha256sum releases/v1.7.0/WeType-Swipe-v1.7.0.apk
          } >> release-payload/v1.7.0/DIAGNOSTIC.txt
          echo "745afacdd84cdd1caacad1c26450b52987b473b5431614d553b33556f8cae33c  releases/v1.7.0/WeType-Swipe-v1.7.0.apk" | sha256sum -c -
      - name: Commit result
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-payload/v1.7.0/DIAGNOSTIC.txt
          if [ "${{ steps.rebuild.outcome }}" = "success" ]; then
            git add releases/v1.7.0/WeType-Swipe-v1.7.0.apk
          fi
          git commit -m "release: record v1.7.0 APK validation" || exit 0
          git push
      - name: Fail when validation failed
        if: steps.rebuild.outcome != 'success'
        run: exit 1
